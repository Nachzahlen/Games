<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ System-Warnung ⚠️</title>
    <style>
        body {
            background-color: black;
            color: red;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding-top: 100px;
        }
        .warning-box {
            border: 5px solid red;
            display: inline-block;
            padding: 20px;
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
    <script>
        function startePrank() {
            // Zeigt nacheinander drei harmlose Popups
            alert("⚠️ ACHTUNG: Unbekannter Zugriff erkannt!");
            alert("Lade Daten herunter... (Scherz!)");
            alert("Du wurdest geprankt! 😜");
        }
    </script>
</head>
<body onload="startePrank()">

    <div class="warning-box">
        <h1>PROZESS GESTARTET</h1>
        <p>IP-Adresse wird analysiert...</p>
        <p>Datenübertragung: 99%</p>
    </div>

    <p style="margin-top: 50px; color: gray;">(Schließe einfach dieses Tab, um die Seite zu verlassen.)</p>

</body>
</html>
