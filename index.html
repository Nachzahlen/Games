<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System-Diagnose</title>
    <style>
        /* Hintergrund mit einem abstrakten Muster */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Die Overlay-Schicht, die den Hintergrund verschwimmen lässt */
        .blur-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(8px); /* Erzeugt den Unschärfe-Effekt */
            background-color: rgba(15, 23, 42, 0.5); /* Dunkle Tönung */
            z-index: 1;
        }

        /* Das Infofenster im Vordergrund */
        .status-card {
            position: relative;
            z-index: 2;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            color: #f8fafc;
        }

        h2 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 0.95rem;
            background-color: #0f172a;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .label {
            color: #94a3b8;
        }

        .value {
            font-family: monospace;
            color: #4ade80;
        }

        .btn {
            width: 100%;
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #0369a1;
        }
    </style>
</head>
<body>

    <!-- Verschwommener Hintergrund -->
    <div class="blur-overlay"></div>

    <!-- Statusfenster -->
    <div class="status-card">
        <h2>System-Konfiguration</h2>
        <p>Folgende öffentlich zugängliche Umgebungsvariablen wurden vom Browser übermittelt:</p>
        
        <div class="info-row">
            <span class="label">Plattform:</span>
            <span class="value" id="platform">Wird geladen...</span>
        </div>
        
        <div class="info-row">
            <span class="label">Verbindungsstatus:</span>
            <span class="value" style="color: #4ade80;">Online</span>
        </div>

        <div class="info-row">
            <span class="label">Sprache:</span>
            <span class="value" id="language">Wird geladen...</span>
        </div>

        <button class="btn" onclick="aktualisiereDaten()">Daten aktualisieren</button>
    </div>

    <script>
        function aktualisiereDaten() {
            // Standardmäßige Browser-Eigenschaften auslesen
            document.getElementById('platform').innerText = navigator.platform || "Unbekannt";
            document.getElementById('language').innerText = navigator.language || "de";
        }

        // Führt die Funktion direkt beim Laden aus
        window.onload = aktualisiereDaten;
    </script>

</body>
</html>
