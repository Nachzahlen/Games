<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Chemie Quiz</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.quiz-container {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: popIn 0.6s ease;
}

@keyframes popIn {
    from {transform: scale(0.8); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

h2 {
    margin-bottom: 20px;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.option {
    background: rgba(255,255,255,0.2);
    color: white;
}

.correct {
    background: #2ecc71 !important;
}

.wrong {
    background: #e74c3c !important;
}

#nextBtn {
    margin-top: 15px;
    background: #f1c40f;
    color: black;
    display: none;
}

.fade {
    animation: fade 0.5s ease;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="quiz-container">
    <h2 id="question">Lade...</h2>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Nächste Frage ➜</button>
    <h3 id="score"></h3>
</div>

<script>
const quiz = [
{
    q: "Welche Eigenschaft nutzt man beim SORTIEREN?",
    a: ["Magnetismus", "Farbe & Form", "Siedepunkt"],
    correct: 1
},
{
    q: "Was trennt man beim SIEBEN?",
    a: ["Flüssigkeiten", "Gase", "Stoffe mit unterschiedlicher Korngröße"],
    correct: 2
},
{
    q: "Wofür nutzt man einen Magneten bei der Trennung?",
    a: ["Dichte", "Magnetismus", "Löslichkeit"],
    correct: 1
},
{
    q: "Welche Stoffe trennt man beim Sortieren?",
    a: ["Nur Flüssigkeiten", "Große feste Stoffe", "Gase"],
    correct: 1
},
{
    q: "Welche Methode nutzt ein Sieb?",
    a: ["Handarbeit", "Gitterstruktur", "Erhitzen"],
    correct: 1
}
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.q;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.a.forEach((ans, index) => {
        const btn = document.createElement("button");
        btn.innerText = ans;
        btn.classList.add("option");
        btn.onclick = () => selectAnswer(index, btn);
        answersDiv.appendChild(btn);
    });

    document.getElementById("nextBtn").style.display = "none";
}

function selectAnswer(index, btn) {
    const correct = quiz[current].correct;
    const buttons = document.querySelectorAll(".option");

    buttons.forEach((b, i) => {
        b.disabled = true;
        if (i === correct) b.classList.add("correct");
        else if (i === index) b.classList.add("wrong");
    });

    if (index === correct) score++;

    document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
    current++;
    if (current < quiz.length) {
        loadQuestion();
    } else {
        document.querySelector(".quiz-container").innerHTML =
        `<h2>🎉 Fertig!</h2><h3>Dein Score: ${score} / ${quiz.length}</h3>`;
    }
}

loadQuestion();
</script>

</body>
</html>
